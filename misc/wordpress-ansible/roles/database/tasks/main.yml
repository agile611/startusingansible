- name: Instalar paquetes de la base de datos
  ansible.builtin.apt:
    name: "{{ packages_database }}"
    state: present
    update_cache: yes
  notify: Reiniciar MariaDB

- name: Corregir permisos de /etc/mysql/my.cnf
  ansible.builtin.file:
    path: /etc/mysql/my.cnf
    owner: root
    group: root
    mode: '0644'

- name: Configurar /etc/mysql/my.cnf correctamente
  ansible.builtin.copy:
    dest: /etc/mysql/my.cnf
    content: |
      !includedir /etc/mysql/conf.d/
      !includedir /etc/mysql/mariadb.conf.d/
    owner: root
    group: root
    mode: '0644'
  notify: Reiniciar MariaDB

- name: Configurar bind-address para aceptar conexiones remotas
  ansible.builtin.lineinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: '^bind-address'
    line: 'bind-address = 0.0.0.0'
    backup: yes
  notify: Reiniciar MariaDB

- name: Asegurar que MariaDB está en ejecución
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: yes

- name: Flush handlers (reinicia MariaDB antes de crear usuarios)
  ansible.builtin.meta: flush_handlers

# ✅ CORRECCIÓN PRINCIPAL: usar login_unix_socket para conectar como root
# En Debian 13 + MariaDB 11.8, root usa unix_socket por defecto.
# La única forma fiable de autenticar en este punto es via socket,
# NO via contraseña — por eso fallaba el ALTER USER anterior.
- name: Cambiar autenticación de root a mysql_native_password (via socket)
  community.mysql.mysql_user:
    name: root
    host: localhost
    plugin: mysql_native_password
    password: "{{ db_root_password }}"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock   # ✅ Conecta via socket, sin contraseña
  become: true

- name: Flush privileges tras cambio de autenticación
  community.mysql.mysql_query:
    query: "FLUSH PRIVILEGES"
    login_unix_socket: /run/mysqld/mysqld.sock
  become: true

# ✅ Crear /root/.my.cnf DESPUÉS de haber cambiado la autenticación
- name: Crear /root/.my.cnf con credenciales de root
  ansible.builtin.copy:
    dest: /root/.my.cnf
    content: |
      [client]
      user=root
      password={{ db_root_password }}
    owner: root
    group: root
    mode: '0600'

- name: DEBUG - Mostrar contraseña que usa Ansible
  ansible.builtin.debug:
    msg: "db_root_password = '{{ db_root_password }}'"

# ✅ Ahora sí conecta con login_password porque ya cambiamos el plugin
- name: Crear la base de datos de WordPress
  community.mysql.mysql_db:
    name: "{{ db_name }}"
    state: present
    login_user: root
    login_password: "{{ db_root_password }}"
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Crear el usuario de WordPress con acceso remoto
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    host: "%"
    state: present
    login_user: root
    login_password: "{{ db_root_password }}"
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Eliminar /root/.my.cnf por seguridad
  ansible.builtin.file:
    path: /root/.my.cnf
    state: absent