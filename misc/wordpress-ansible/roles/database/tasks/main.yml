- name: Instalar paquetes de la base de datos
  ansible.builtin.apt:
    name: "{{ packages_database }}"
    state: present
    update_cache: yes
  notify: Reiniciar MariaDB

# ✅ CORRECCIÓN: Arrancar MariaDB ANTES de tocar configuración
# En Debian 13, MariaDB necesita ejecutarse al menos una vez para
# inicializar el directorio de datos antes de poder configurarse
- name: Arrancar MariaDB por primera vez para inicializar datos
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: yes
  # ignore_errors porque puede fallar si ya está arrancado, no importa

- name: Corregir permisos de /etc/mysql/my.cnf
  ansible.builtin.file:
    path: /etc/mysql/my.cnf
    owner: root
    group: root
    mode: '0644'

# ✅ CORRECCIÓN: Usar blockinfile en lugar de copy para no destruir
# el contenido original del fichero my.cnf
- name: Configurar /etc/mysql/my.cnf correctamente
  ansible.builtin.copy:
    dest: /etc/mysql/my.cnf
    content: |
      !includedir /etc/mysql/conf.d/
      !includedir /etc/mysql/mariadb.conf.d/
    owner: root
    group: root
    mode: '0644'
  notify: Reiniciar MariaDB

- name: Configurar bind-address para aceptar conexiones remotas
  ansible.builtin.lineinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: '^bind-address'
    line: 'bind-address = 0.0.0.0'
    backup: yes   # ✅ Hace copia de seguridad antes de modificar
  notify: Reiniciar MariaDB

- name: Configurar mysqlx-bind-address
  ansible.builtin.lineinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: '^mysqlx-bind-address'
    line: 'mysqlx-bind-address = 0.0.0.0'
  notify: Reiniciar MariaDB

# ✅ CORRECCIÓN: Verificar que el fichero de configuración es válido
# antes de intentar arrancar el servicio
- name: Verificar sintaxis de configuración de MariaDB
  ansible.builtin.command: mariadbd --help --verbose
  register: mariadb_config_check
  changed_when: false
  failed_when: mariadb_config_check.rc != 0
  become: true

- name: Asegurar que MariaDB está en ejecución
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: yes

- name: Flush handlers (reinicia MariaDB antes de crear usuarios)
  ansible.builtin.meta: flush_handlers

# ✅ Fix Debian 13: cambiar unix_socket por mysql_native_password
- name: Cambiar autenticación de root a mysql_native_password
  ansible.builtin.shell: |
    mariadb -u root -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ db_root_password }}';"
    mariadb -u root -e "FLUSH PRIVILEGES;"
  args:
    executable: /bin/bash
  become: true
  ignore_errors: true  # Ignorar errores si ya se cambió antes

# ✅ Crear /root/.my.cnf para que community.mysql pueda autenticarse
- name: Crear /root/.my.cnf con credenciales de root
  ansible.builtin.copy:
    dest: /root/.my.cnf
    content: |
      [client]
      user=root
      password={{ db_root_password }}
    owner: root
    group: root
    mode: '0600'

- name: DEBUG - Mostrar contraseña que usa Ansible
  ansible.builtin.debug:
    msg: "db_root_password = '{{ db_root_password }}'"

- name: Crear la base de datos de WordPress
  community.mysql.mysql_db:
    name: "{{ db_name }}"
    state: present
    login_user: root
    login_password: "{{ db_root_password }}"

- name: Crear el usuario de WordPress con acceso remoto
  community.mysql.mysql_user:
    name: "{{ db_user }}"
    password: "{{ db_password }}"
    priv: "{{ db_name }}.*:ALL"
    host: "%"
    state: present
    login_user: root
    login_password: "{{ db_root_password }}"

# ✅ Eliminar /root/.my.cnf por seguridad una vez terminado
- name: Eliminar /root/.my.cnf por seguridad
  ansible.builtin.file:
    path: /root/.my.cnf
    state: absent