services:
  ansible:
    build: .
    container_name: ansible
    hostname: ansible
    networks:
      ansible-net:
        ipv4_address: 10.11.12.10
    volumes:
      - ./ssh:/home/vagrant/.ssh/host_keys
      - .:/home/vagrant/workspace
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    stdin_open: true
    tty: true
    privileged: true
    cgroup: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    cap_add:
      - NET_ADMIN

  # Other services can remain as is or be adjusted similarly
  database:
    image: jrei/systemd-debian:latest
    container_name: database
    hostname: database
    networks:
      ansible-net:
        ipv4_address: 10.11.12.20
    ports:
      - "8081:80"
      - "3306:3306"
      - "2220:22"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    privileged: true
    cgroup: host
    cap_add:
      - NET_ADMIN

  # Load balancer and web server configurations remain unchanged
  loadbalancer:
    image: jrei/systemd-debian:latest
    container_name: loadbalancer
    hostname: loadbalancer
    networks:
      ansible-net:
        ipv4_address: 10.11.12.30
    ports:
      - "8080:80"
      - "33061:3306"
      - "2221:22"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    privileged: true
    cgroup: host
    cap_add:
      - NET_ADMIN

  webserver:
    image: jrei/systemd-debian:latest
    container_name: webserver
    hostname: webserver
    networks:
      ansible-net:
        ipv4_address: 10.11.12.40
    ports:
      - "80:80"
      - "33062:3306"
      - "2222:22"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    privileged: true
    cgroup: host
    cap_add:
      - NET_ADMIN

networks:
  ansible-net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.11.12.0/24
          gateway: 10.11.12.1