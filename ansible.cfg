[defaults]
inventory = hosts
remote_user = vagrant
private_key_file = /home/vagrant/.ssh/id_rsa
interpreter_python = /usr/bin/python3
timeout = 30

[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=30 -o ServerAliveCountMax=3
pipelining = True
retries = 5
control_path = %(directory)s/%%h-%%r