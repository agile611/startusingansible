<VirtualHost *>
    WSGIScriptAlias / /var/www/demo/demo.wsgi
    WSGIDaemonProcess demo python-home=/var/www/demo/.venv python-path=/var/www/demo
    WSGIProcessGroup demo

    <Directory /var/www/demo>
        WSGIProcessGroup demo
        WSGIApplicationGroup %{GLOBAL}
        Order deny,allow
        Allow from all
    </Directory>
</VirtualHost>
