# tasks file for mysql
---
- name: install tools
  apt: name={{item}} state=present update_cache=yes
  with_items:
    - default-mysql-server
    - python3-mysqldb

- name: install mysql-server
  apt: name=default-mysql-server state=present update_cache=yes

- name: ensure mysql listening on all ports
  lineinfile: dest=/etc/mysql/mariadb.conf.d/50-server.cnf regexp=^bind-address line="bind-address = 0.0.0.0"

- name: ensure mysql started
  service: name=mysql state=started enabled=yes

- name: create demo database
  ansible.mysql.mysql_db: name=demo state=present

- name: create demo user
  ansible.mysql.mysql_user: name=demo password=demo priv=demo.*:ALL host='%' state=present
