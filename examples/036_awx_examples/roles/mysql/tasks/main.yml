---
- name: Installa el paquet de Python per a MySQL
  pip:
    name: PyMySQL
    
- name: install tools
  apt: name={{item}} state=present update_cache=yes
  with_items:
    - default-mysql-server
    - python3-mysqldb

- name: install mysql-server
  apt: name=default-mysql-server state=present update_cache=yes

- name: ensure mysql listening on all ports
  lineinfile: dest=/etc/mysql/mariadb.conf.d/50-server.cnf regexp=^bind-address line="bind-address = {{ db_server }}"
  notify: restart mysql

- name: ensure mysql started
  service: name=mysql state=started enabled=yes

- name: create database
  mysql_db: name={{ db_name }} state=present

- name: create user
  mysql_user: name={{ db_user_name }} password={{ db_user_pass }} priv={{ db_name }}.*:ALL
              host='{{ db_user_host }}' state=present
