---
- hosts: database
  become: true
  tasks:
    - name: Remove packages from mysql
      command: apt-get -y purge default-mysql-server default-mysql-client mysql-common

    - name: install default-mysql-server
      apt: name=default-mysql-server state=present update_cache=yes

    - name: ensure mysql started
      service: name=mysql state=started enabled=yes

    - name: ensure mysql listening on all ports
      lineinfile: dest=/etc/mysql/mariadb.conf.d/50-server.cnf regexp=^bind-address line="bind-address = 0.0.0.0"